apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

namePrefix: dev-

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace             
        path: /spec/replicas
        value: 1

      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: gitops-app

images:
  - name: gitops-app
    #newName: ACCOUNT_ID.idk.ecr.us-east-1.amazonaws.com/gitops-app
    newName: gitops-app
    newTag: latest



    #kubectl kustomize k8s/overlays/dev  ------ to test if working